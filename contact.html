<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Title</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="#">Kelompok Akhir</a>

        <div class="collapse navbar-collapse show">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="about.html">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="contact.html">Contact</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Header -->
    <div class="bg-success text-white text-center p-5">
      <h1>Contact Us</h1>
      <p>Kelompok Terakhir</p>
    </div>

    <!-- Content -->
    <div class="container my-5">
      <div class="row">
        <!-- Form -->
        <div class="col-md-6">
          <div class="card shadow p-4">
            <h4>Hubungi Kami</h4>
            <form>
              <div class="mb-3">
                <label>Nama</label>
                <input type="text" class="form-control" required />
              </div>

              <div class="mb-3">
                <label>Email</label>
                <input type="email" class="form-control" required />
              </div>

              <div class="mb-3">
                <label>Pesan</label>
                <textarea class="form-control" rows="4" required></textarea>
              </div>

              <button class="btn btn-success">Kirim</button>
            </form>
          </div>
        </div>

        <!-- Info -->
        <div class="col-md-6">
          <div class="card shadow p-4">
            <h4>Tim Kami</h4>
            <ul>
              <li>Yori</li>
              <li>Mutia</li>
              <li>Tari</li>
              <li>Zahra</li>
            </ul>

            <hr />

            <p>Email: yoriadiatma@gmail.com</p>
            <p>HP: 08123456789</p>
            <p>Instagram: @kelompok_terakhir</p>
          </div>
        </div>
      </div>
    </div>

    <footer class="bg-dark text-white text-center p-3">
      Copyright &copy; 2026 Kelompok Terakhir
    </footer>
